app:
  ai:
    provider: deepseek
    # ollama or deepseek

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: autominutes_backend
  ai:
    model:
      chat: openai
      # ollama or openai
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2000ms
        multiplier: 5
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3.5:2b

  datasource:
    url: jdbc:postgresql://localhost:5433/autominutes
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  web:
    error:
      include-message: always
      include-stacktrace: never
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


security:
  jwt:
    secret: ${JWT_SECRET_BASE64:QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo5ODc2NTQzMjEwQUJDREVG}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

minio:
  url: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: autominutes-recordings

